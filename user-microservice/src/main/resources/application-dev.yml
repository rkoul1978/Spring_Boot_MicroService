spring:
  application:
    name: user-microservice
  data:
    mongodb:
      uri: mongodb://admin:password@localhost:27017/user_db?authSource=admin

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.microservice: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
